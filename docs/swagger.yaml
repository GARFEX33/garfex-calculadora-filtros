        type: string
      details:
        type: string
      error:
        type: string
      success:
        type: boolean
    type: object
  http.ConductorTierraRequest:
    properties:
      itm:
        description: ITM es el Interruptor Termomagnético en amperes (requerido, >
          0).
        type: integer
      material:
        description: |-
          Material es el material del conductor ("Cu" o "Al").
          Si está vacío, se usa "Cu" por defecto.
        type: string
