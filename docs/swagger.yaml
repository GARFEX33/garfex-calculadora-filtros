host: localhost:8080
info:
  contact: {}
  description: API para memorias de cálculo de instalaciones eléctricas según normativa
    NOM (México)
  title: Garfex Calculadora de Filtros API
  version: "1.0"
paths:
  /calculos/amperaje:
    post:
      consumes:
      - application/json
      description: Calcula el amperaje nominal de un equipo a partir de su potencia
        y factor de potencia
      parameters:
      - description: Datos de potencia y sistema
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.CalcularAmperajeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Amperaje calculado exitosamente
          schema:
            $ref: '#/definitions/http.CalcularAmperajeResponse'
        "400":
          description: Error de validación
          schema:
            $ref: '#/definitions/http.CalcularAmperajeResponseError'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/http.CalcularAmperajeResponseError'
      summary: Calcular amperaje nominal
      tags:
      - Corriente
  /calculos/caida-tension:
    post:
      consumes:
      - application/json
      description: Calcula la caída de tensión en un circuito según IEEE-141. Requiere
        factor_potencia (cosθ) en rango (0, 1].
      parameters:
      - description: Datos del circuito y conductor
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.CaidaTensionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Caída de tensión calculada
          schema:
            $ref: '#/definitions/http.CaidaTensionResponse'
        "400":
          description: Error de validación o datos inválidos
          schema:
            $ref: '#/definitions/http.CaidaTensionResponseError'
        "422":
          description: No se encontró la impedancia para el calibre y canalización
          schema:
            $ref: '#/definitions/http.CaidaTensionResponseError'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/http.CaidaTensionResponseError'
      summary: Calcular caída de tensión
      tags:
      - Caída de Tensión
  /calculos/charola/espaciado:
    post:
      consumes:
      - application/json
      description: Calcula el espaciado requerido entre conductores en charola tipo
        escalera
      parameters:
      - description: Datos de hilos y diámetro de conductores
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.CharolaEspaciadoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Espaciado calculado
          schema:
            $ref: '#/definitions/http.CharolaEspaciadoResponse'
        "400":
          description: Error de validación
          schema:
            $ref: '#/definitions/http.CharolaEspaciadoResponseError'
        "422":
          description: No se pudo calcular el tamaño de charola
          schema:
            $ref: '#/definitions/http.CharolaEspaciadoResponseError'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/http.CharolaEspaciadoResponseError'
      summary: Calcular espaciado en charola
      tags:
      - Canalización
  /calculos/charola/triangular:
    post:
      consumes:
      - application/json
      description: Calcula el ancho de charola en configuración triangular (cables
        en posición Herculana)
      parameters:
      - description: Datos de hilos y diámetro de conductores
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.CharolaTriangularRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Configuración triangular calculada
          schema:
            $ref: '#/definitions/http.CharolaTriangularResponse'
        "400":
          description: Error de validación
          schema:
            $ref: '#/definitions/http.CharolaTriangularResponseError'
        "422":
          description: No se pudo calcular el tamaño de charola
          schema:
            $ref: '#/definitions/http.CharolaTriangularResponseError'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/http.CharolaTriangularResponseError'
      summary: Calcular configuración triangular
      tags:
      - Canalización
  /calculos/conductor-alimentacion:
    post:
      consumes:
      - application/json
      description: Selecciona el conductor de alimentación (fase) según la corriente
        ajustada y tipo de canalización
      parameters:
      - description: Datos de corriente y canalización
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.ConductorAlimentacionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Conductor seleccionado exitosamente
          schema:
            $ref: '#/definitions/http.ConductorAlimentacionResponse'
        "400":
          description: Error de validación o datos inválidos
          schema:
            $ref: '#/definitions/http.ConductorAlimentacionResponseError'
        "422":
          description: No se encontró conductor adecuado
          schema:
            $ref: '#/definitions/http.ConductorAlimentacionResponseError'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/http.ConductorAlimentacionResponseError'
      summary: Seleccionar conductor de alimentación
      tags:
      - Conductor
  /calculos/conductor-tierra:
    post:
      consumes:
      - application/json
      description: Selecciona el conductor de tierra según el ITM (interruptor termomagnético)
        y material
      parameters:
      - description: ITM y material del conductor
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.ConductorTierraRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Conductor de tierra seleccionado
          schema:
            $ref: '#/definitions/http.ConductorTierraResponse'
        "400":
          description: Error de validación
          schema:
            $ref: '#/definitions/http.ConductorTierraResponseError'
        "422":
          description: No se encontró conductor de tierra adecuado
          schema:
            $ref: '#/definitions/http.ConductorTierraResponseError'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/http.ConductorTierraResponseError'
      summary: Seleccionar conductor de tierra
      tags:
      - Conductor
  /calculos/corriente-ajustada:
    post:
      consumes:
      - application/json
      description: Ajusta la corriente nominal por factores de temperatura, agrupamiento
        y uso según NOM
      parameters:
      - description: Datos de instalación y equipo
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.CorrienteAjustadaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Corriente ajustada calculada
          schema:
            $ref: '#/definitions/http.CorrienteAjustadaResponse'
        "400":
          description: Error de validación o datos inválidos
          schema:
            $ref: '#/definitions/http.CorrienteAjustadaResponseError'
        "422":
          description: No se pudo calcular el ajuste
          schema:
            $ref: '#/definitions/http.CorrienteAjustadaResponseError'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/http.CorrienteAjustadaResponseError'
      summary: Calcular corriente ajustada
      tags:
      - Corriente
  /calculos/memoria:
    post:
      consumes:
      - application/json
      description: 'Calcula la memoria de cálculo completa para una instalación eléctrica
        según normativa NOM (México). Orquesta: corriente nominal → ajuste → conductor
        alimentación → conductor tierra → canalización → caída de tensión.'
      parameters:
      - description: Datos del equipo e instalación
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.CalcularMemoriaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Memoria de cálculo exitosa
          schema:
            $ref: '#/definitions/http.CalcularMemoriaResponse'
        "400":
          description: Error de validación o datos inválidos
          schema:
            $ref: '#/definitions/http.CalcularMemoriaResponseError'
        "422":
          description: No se encontró conductor o canalización adecuada
          schema:
            $ref: '#/definitions/http.CalcularMemoriaResponseError'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/http.CalcularMemoriaResponseError'
      summary: Memoria de cálculo completa
      tags:
      - Memoria
  /calculos/tuberia:
    post:
      consumes:
      - application/json
      description: Dimensiona el tamaño de tubería requerido según los calibres de
        conductores
      parameters:
      - description: Datos de conductores y tubería
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.CalcularTuberiaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Tamaño de tubería calculado
          schema:
            $ref: '#/definitions/http.CalcularTuberiaResponse'
        "400":
          description: Error de validación
          schema:
            $ref: '#/definitions/http.CalcularTuberiaResponseError'
        "422":
          description: Conductor no encontrado o tubería no disponible
          schema:
            $ref: '#/definitions/http.CalcularTuberiaResponseError'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/http.CalcularTuberiaResponseError'
      summary: Dimensionar tubería
      tags:
      - Canalización
schemes:
- http
- https
swagger: "2.0"
