      calibre_tierra:
        type: string
      num_fases:
        type: integer
      num_neutros:
        minimum: 0
        type: integer
      num_tuberias:
        type: integer
      tipo_canalizacion:
        type: string
    required:
    - calibre_fase
    - calibre_tierra
    - num_fases
    - num_tuberias
    - tipo_canalizacion
    type: object
  http.CalcularTuberiaResponse:
    properties:
      data:
        $ref: '#/definitions/dto.TuberiaOutput'
      success:
        type: boolean
    type: object
  http.CalcularTuberiaResponseError:
    properties:
      code:
        type: string
      details:
        type: string
      error:
        type: string
      success:
        type: boolean
    type: object
  http.CharolaEspaciadoRequest:
    properties:
      diametro_control_mm:
        type: number
      diametro_fase_mm:
        type: number
      diametro_tierra_mm:
        type: number
      hilos_por_fase:
        type: integer
      sistema_electrico:
        type: string
    required:
    - diametro_fase_mm
    - diametro_tierra_mm
    - hilos_por_fase
    - sistema_electrico
    type: object
  http.CharolaEspaciadoResponse:
    properties:
      data:
        $ref: '#/definitions/dto.CharolaEspaciadoOutput'
      success:
        type: boolean
    type: object
  http.CharolaEspaciadoResponseError:
    properties:
      code:
        type: string
      details:
        type: string
      error:
        type: string
      success:
        type: boolean
    type: object
  http.CharolaTriangularRequest:
    properties:
      diametro_control_mm:
        type: number
      diametro_fase_mm:
        type: number
      diametro_tierra_mm:
        type: number
      hilos_por_fase:
        type: integer
    required:
    - diametro_fase_mm
    - diametro_tierra_mm
    - hilos_por_fase
    type: object
  http.CharolaTriangularResponse:
    properties:
      data:
        $ref: '#/definitions/dto.CharolaTriangularOutput'
      success:
        type: boolean
    type: object
  http.CharolaTriangularResponseError:
    properties:
      code:
        type: string
      details:
        type: string
      error:
        type: string
