basePath: /api/v1
definitions:
  dto.CharolaEspaciadoOutput:
    properties:
      ancho_comercial_mm:
        type: number
      ancho_control_mm:
        type: number
      ancho_fuerza_mm:
        type: number
      ancho_requerido_mm:
        type: number
      ancho_tierra_mm:
        type: number
      diametro_control_mm:
        type: number
      diametro_fase_mm:
        description: Valores intermedios del desarrollo — para mostrar en memoria
          de cálculo
        type: number
      diametro_tierra_mm:
        type: number
      espacio_control_mm:
        type: number
      espacio_fuerza_mm:
        type: number
      num_hilos_total:
        type: integer
      tamano:
        type: string
      tamano_pulgadas:
        type: string
      tipo:
        type: string
    type: object
  dto.CharolaTriangularOutput:
    properties:
      ancho_comercial_mm:
        type: number
      ancho_control_mm:
        type: number
      ancho_potencia_mm:
        type: number
      ancho_requerido_mm:
        type: number
      ancho_tierra_mm:
        type: number
      diametro_control_mm:
        type: number
      diametro_fase_mm:
        description: Valores intermedios del desarrollo — para mostrar en memoria
          de cálculo
        type: number
      diametro_tierra_mm:
        type: number
      espacio_control_mm:
        type: number
      espacio_fuerza_mm:
        type: number
      factor_triangular:
        type: number
      tamano:
        type: string
      tamano_pulgadas:
        type: string
      tipo:
        type: string
    type: object
  dto.ConductorAlimentacionOutput:
    properties:
      calibre:
        description: 'Calibre es el calibre del conductor seleccionado (ej: "4 AWG",
          "250 MCM").'
        type: string
      capacidad_nominal:
        description: CapacidadNominal es la ampacidad del conductor segun la tabla.
        type: number
      material:
        description: Material es el material del conductor ("Cu" o "Al").
        type: string
      seccion_mm2:
        description: SeccionMM2 es la seccion transversal en mm2.
        type: number
      tabla_usada:
        description: TablaUsada es el nombre descriptivo de la tabla NOM utilizada.
        type: string
      tipo_aislamiento:
        description: 'TipoAislamiento es el tipo de aislamiento (ej: "THHN/THHW").'
        type: string
    type: object
  dto.ConductorTierraOutput:
    properties:
      calibre:
        description: 'Calibre es el calibre del conductor seleccionado (ej: "12 AWG",
          "2 AWG").'
        type: string
      itm_hasta:
        description: ITMHasta es el ITM máximo para el cual aplica este calibre.
        type: integer
      material:
        description: Material es el material del conductor ("Cu" o "Al").
        type: string
      num_hilos:
        description: NumHilos es el número de hilos de tierra (1 para charola/tubería≤2,
          2 para tubería>2).
        type: integer
      seccion_mm2:
        description: SeccionMM2 es la sección transversal en mm².
        type: number
    type: object
  dto.DatosCanalizacionCompleta:
    properties:
      detalle_charola:
        allOf:
        - $ref: '#/definitions/dto.DetalleCharola'
        description: |-
          DetalleCharola contiene los valores intermedios del cálculo de charola.
          Es nil cuando la canalización es tubería.
      detalle_tuberia:
        allOf:
        - $ref: '#/definitions/dto.DetalleTuberia'
        description: |-
          DetalleTuberia contiene los valores intermedios del cálculo de tubería.
          Es nil cuando la canalización es charola.
      fill_factor:
        description: |-
          FillFactor es el factor de llenado calculado (área ocupante / área disponible).
          Debe ser ≤ 0.40 para más de 2 conductores según NOM.
        type: number
      resultado:
        allOf:
        - $ref: '#/definitions/dto.ResultadoCanalizacion'
        description: Resultado contiene el resultado del dimensionamiento de canalización.
    type: object
  dto.DatosCorrientes:
    properties:
      cantidad_conductores:
        description: |-
          CantidadConductores es el total de conductores en el sistema.
          Calculado según el sistema eléctrico (DELTA, ESTRELLA, etc.) y hilos por fase.
        type: integer
      conductores_por_tubo:
        description: |-
          ConductoresPorTubo es el número de conductores por tubo o canal.
          Valor de entrada del usuario o calculado según el sistema eléctrico.
        type: integer
      corriente_ajustada:
        description: |-
          CorrienteAjustada es la corriente ajustada por factores de corrección en el paso 2 (Step 2).
          Calculada: CorrienteNominal / (FactorTemperatura × FactorAgrupamiento × FactorUso)
        type: number
      corriente_nominal:
        description: |-
          CorrienteNominal es la corriente nominal calculada en el paso 1 (Step 1).
          Calculada a partir de la potencia o amperaje del equipo.
        type: number
      corriente_por_hilo:
        description: |-
          CorrientePorHilo es la corriente que circula por cada hilo cuando hay conductores en paralelo.
          Calculada: CorrienteAjustada / HilosPorFase
        type: number
      factor_agrupamiento:
        description: |-
          FactorAgrupamiento es el factor de corrección por agrupamiento de circuitos.
          Valor de las tablas NOM según cantidad de conductores.
        type: number
      factor_temperatura:
        description: |-
          FactorTemperatura es el factor de corrección por temperatura ambiente.
          Valor de las tablas NOM según temperatura ambiente y temperatura del cable.
        type: number
      factor_total_ajuste:
        description: |-
          FactorTotalAjuste es el factor total combinado de corrección.
          Calculado: FactorTemperatura × FactorAgrupamiento × FactorUso
        type: number
      tabla_ampacidad_usada:
        description: |-
          TablaAmpacidadUsada es la tabla NOM utilizada para la selección de ampacidad.
          Ejemplo: "Tabla 310-16" o "Tabla 310-17".
        type: string
      temperatura_ambiente:
        description: |-
          TemperaturaAmbiente es la temperatura ambiente en grados Celsius.
          Valor de entrada del usuario (determinado por el estado de la República).
        type: integer
      temperatura_referencia:
        description: |-
          TemperaturaReferencia es la temperatura de operación del cable seleccionada (60, 75 o 90°C).
          Determinada por el tipo de aislamiento y las tablas NOM.
        type: integer
    type: object
  dto.DatosEquipo:
    properties:
      amperaje:
        description: Qn/In - amperaje nominal o KVA/KVAR según tipo
        type: integer
      bornes:
        description: Número de bornes (opcional)
        type: integer
      clave:
        description: 'Clave comercial (ej: ACTISINE48D400MMB)'
        type: string
      itm:
        description: Interruptor termomagnético
        type: integer
      tipo:
        allOf:
        - $ref: '#/definitions/dto.TipoFiltro'
        description: '"A", "KVA", "KVAR"'
      voltaje:
        description: 'Voltaje nominal (ej: 480)'
        type: integer
    type: object
  dto.DatosInstalacion:
    properties:
      hilos_por_fase:
        description: |-
          HilosPorFase es el número de conductores por fase en paralelo.
          Valor de entrada del usuario (default: 1).
        type: integer
      longitud_circuito:
        description: |-
          LongitudCircuito es la longitud del circuito en metros.
          Valor de entrada del usuario.
        type: number
      material:
        description: |-
          Material es el material del conductor (CU para cobre, AL para aluminio).
          Valor de entrada del usuario.
        type: string
      porcentaje_caida_maximo:
        description: |-
          PorcentajeCaidaMaximo es el límite de caída de tensión permitido en porcentaje.
          Valor de entrada del usuario (default: 3.0%).
        type: number
      sistema_electrico:
        allOf:
        - $ref: '#/definitions/dto.SistemaElectrico'
        description: |-
          SistemaElectrico indica el tipo de sistema eléctrico (DELTA, ESTRELLA, BIFASICO, MONOFASICO).
          Valor de entrada del usuario.
      tension:
        description: |-
          Tension es el voltaje de operación en volts.
          Valor de entrada del usuario.
        type: integer
      tipo_canalizacion:
        description: |-
          TipoCanalizacion indica el tipo de canalización a utilizar (TUBERIA_PVC, CHAROLA_CABLE_ESPACIADO, etc.).
          Valor de entrada del usuario.
        type: string
    type: object
  dto.DatosProteccion:
    properties:
      itm:
        description: |-
          ITM es el interruptor termomagnético en Amperes.
          Valor de entrada del usuario o obtenido del catálogo de equipos.
        type: integer
    type: object
  dto.DetalleCharola:
    properties:
      ancho_control_mm:
        type: number
      ancho_fuerza_mm:
        type: number
      ancho_potencia_mm:
        description: Charola triangular (adicional)
        type: number
      ancho_tierra_mm:
        type: number
      diametro_control_mm:
        type: number
      diametro_fase_mm:
        description: Diámetros de los conductores (mm)
        type: number
      diametro_tierra_mm:
        type: number
      espacio_control_mm:
        type: number
      espacio_fuerza_mm:
        type: number
      factor_triangular:
        type: number
      num_hilos_total:
        description: Charola espaciado
        type: integer
    type: object
  dto.DetalleTuberia:
    properties:
      area_fase_mm2:
        description: |-
          Áreas físicas de conductores (mm²)
          Fase: Tabla 5 NOM (área con aislamiento THW)
          Tierra: Tabla 8 NOM (conductor desnudo)
        type: number
      area_neutro_mm2:
        description: nil si DELTA (sin neutro)
        type: number
      area_ocupacion_tubo_mm2:
        description: Tubo seleccionado de la tabla NOM (Cap. 9)
        type: number
      area_tierra_mm2:
        type: number
      designacion_metrica:
        description: 'ej: "63" → mostrar como "63 mm"'
        type: string
      fill_factor:
        description: 0.40 para >2 conductores
        type: number
      num_fases_por_tubo:
        description: Distribución de conductores por tubo
        type: integer
      num_neutros_por_tubo:
        description: 0 si DELTA
        type: integer
      num_tierras:
        description: 1 o 2 según NOM
        type: integer
    type: object
  dto.MemoriaOutput:
    properties:
      cable_fase:
        allOf:
        - $ref: '#/definitions/dto.ResultadoConductor'
        description: |-
          CableFase es el conductor de alimentación (fase).
          Resultado del paso 4 de selección de conductor.
      cable_neutro:
        allOf:
        - $ref: '#/definitions/dto.ResultadoConductor'
        description: |-
          CableNeutro es el conductor neutro.
          Es nil para sistemas DELTA (sin neutro).
      cable_tierra:
        allOf:
        - $ref: '#/definitions/dto.ResultadoConductor'
        description: |-
          CableTierra es el conductor de tierra.
          Resultado del paso 5 de selección de conductor de tierra.
      caida_tension:
        allOf:
        - $ref: '#/definitions/dto.ResultadoCaidaTension'
        description: |-
          CaidaTension contiene el resultado del cálculo de caída de tensión.
          Resultado del paso 7.
      canalizacion:
        allOf:
        - $ref: '#/definitions/dto.DatosCanalizacionCompleta'
        description: Canalizacion agrupa el resultado del dimensionamiento de canalización.
      corrientes:
        allOf:
        - $ref: '#/definitions/dto.DatosCorrientes'
        description: Corrientes agrupa los datos de corrientes y factores de ajuste.
      cumple_normativa:
        description: |-
          CumpleNormativa indica si la instalación cumple toda la normativa NOM.
          Es true si todos los criterios de selección son válidos.
        type: boolean
      equipo:
        allOf:
        - $ref: '#/definitions/dto.DatosEquipo'
        description: |-
          Equipo contiene los datos del equipo/filtro del catálogo.
          Valor de entrada del usuario (modo LISTADO).
      estado:
        description: |-
          Estado indica el estado de la República Mexicana para determinar la temperatura ambiente.
          Valor de entrada del usuario.
        type: string
      factor_potencia:
        description: |-
          FactorPotencia es el factor de potencia del equipo (cosθ ∈ (0, 1]).
          Valor de entrada del usuario (solo para modo MANUAL_POTENCIA).
        type: number
      instalacion:
        allOf:
        - $ref: '#/definitions/dto.DatosInstalacion'
        description: Instalacion agrupa los parámetros de instalación ingresados por
          el usuario.
      observaciones:
        description: Observaciones contiene notas y advertencias sobre la instalación.
        items:
          type: string
        type: array
      pasos:
        description: Pasos contiene el detalle de todos los pasos del cálculo para
          debugging.
        items:
          $ref: '#/definitions/dto.PasoMemoria'
        type: array
      proteccion:
        allOf:
        - $ref: '#/definitions/dto.DatosProteccion'
        description: Proteccion agrupa los datos de protección eléctrica.
      tipo_equipo:
        description: |-
          TipoEquipo indica el tipo de equipo (FILTRO_ACTIVO, TRANSFORMADOR, FILTRO_RECHAZO, CARGA).
          Valor de entrada del usuario.
        type: string
    type: object
  dto.ModoCalculo:
    enum:
    - LISTADO
    - MANUAL_AMPERAJE
    - MANUAL_POTENCIA
    type: string
    x-enum-varnames:
    - ModoListado
    - ModoManualAmperaje
    - ModoManualPotencia
  dto.PasoMemoria:
    properties:
      descripcion:
        type: string
      nombre:
        type: string
      numero:
        type: integer
      resultado: {}
    type: object
  dto.ResultadoAjusteCorriente:
    properties:
      cantidad_conductores_total:
        type: integer
      conductores_por_tubo:
        type: integer
      corriente_ajustada:
        type: number
      factor_agrupamiento:
        type: number
      factor_temperatura:
        type: number
      factor_total:
        type: number
      factor_uso:
        type: number
      temperatura:
        type: integer
      temperatura_ambiente:
        type: integer
    type: object
  dto.ResultadoCaidaTension:
    properties:
      caida_volts:
        type: number
      cumple:
        type: boolean
      impedancia:
        type: number
      limite_porcentaje:
        type: number
      porcentaje:
        type: number
      reactancia:
        type: number
      resistencia:
        type: number
    type: object
  dto.ResultadoCanalizacion:
    properties:
      ancho_comercial_mm:
        type: number
      area_requerida_mm2:
        type: number
      area_total_mm2:
        type: number
      numero_de_tubos:
        type: integer
      tamano:
        type: string
    type: object
  dto.ResultadoConductor:
    properties:
      calibre:
        type: string
      calibre_original_ampacidad:
        description: CalibreOriginalAmpacidad es el calibre que hubiera correspondido
          solo por ampacidad
        type: string
      capacidad:
        type: number
      material:
        type: string
      nota_seleccion:
        description: NotaSeleccion explica el motivo del aumento de calibre
        type: string
      num_hilos:
        description: Número de hilos de tierra (1 para charola/tubería≤2, 2 para tubería>2)
        type: integer
      seccion_mm2:
        type: number
      seleccion_por_caida_tension:
        description: |-
          Selección por caída de tensión (NOM-001-SEDE)
          SeleccionPorCaidaTension indica si el calibre fue aumentado por caída de tensión
        type: boolean
      tipo_aislamiento:
        type: string
    type: object
  dto.SistemaElectrico:
    enum:
    - DELTA
    - ESTRELLA
    - BIFASICO
    - MONOFASICO
    type: string
    x-enum-varnames:
    - SistemaElectricoDelta
    - SistemaElectricoEstrella
    - SistemaElectricoBifasico
    - SistemaElectricoMonofasico
  dto.TipoFiltro:
    enum:
    - A
    - KVA
    - KVAR
    type: string
    x-enum-comments:
      TipoFiltroA: Filtro activo en Amperes
      TipoFiltroKVA: Filtro calificado en KVA
      TipoFiltroKVAR: Filtro de rechazo en KVAR
    x-enum-varnames:
    - TipoFiltroA
    - TipoFiltroKVA
    - TipoFiltroKVAR
  dto.TuberiaOutput:
    properties:
      area_fase_mm2:
        description: Nuevos campos para el desarrollo detallado
        type: number
      area_neutro_mm2:
        description: nil si no hay neutro (DELTA)
        type: number
      area_ocupacion_tubo_mm2:
        type: number
      area_por_tubo_mm2:
        type: number
      area_tierra_mm2:
        type: number
      designacion_metrica:
        type: string
      fill_factor:
        type: number
      num_fases_por_tubo:
        type: integer
      num_neutros_por_tubo:
        type: integer
      num_tierras:
        type: integer
      num_tuberias:
        type: integer
      tipo_canalizacion:
        type: string
      tuberia_recomendada:
        type: string
    type: object
  http.CaidaTensionRequest:
    properties:
      calibre:
        description: 'Calibre es el calibre del conductor (ej: "2 AWG", "250 MCM")'
        type: string
      corriente_nominal:
        description: CorrienteNominal es la corriente nominal del circuito en amperes
        type: number
      factor_potencia:
        description: |-
          FactorPotencia es el coseno del ángulo de desfasamiento (cosθ)
          Representa el factor de potencia del circuito: 0 < FP ≤ 1
          Ejemplos: 0.85 (motores típicos), 0.9 (cargas mixtas), 1.0 (carga resistiva pura)
        maximum: 1
        type: number
      hilos_por_fase:
        description: HilosPorFase es el número de hilos por fase
        minimum: 1
        type: integer
      limite_caida:
        description: LimiteCaida es el límite de caída de tensión en porcentaje
        type: number
      longitud_circuito:
        description: LongitudCircuito es la longitud del circuito en metros
        type: number
      material:
        description: Material es el material del conductor ("Cu" = cobre, "Al" = aluminio)
        type: string
      sistema_electrico:
        description: |-
          SistemaElectrico es el tipo de sistema eléctrico
          Valores: "MONOFASICO", "BIFASICO", "DELTA", "ESTRELLA"
        type: string
      tension:
        description: Tension es la tensión del sistema en volts
        type: integer
      tipo_canalizacion:
        description: |-
          TipoCanalizacion es el tipo de canalización
          Valores: "TUBERIA_PVC", "TUBERIA_METALICA", "CHAROLA"
        type: string
      tipo_voltaje:
        description: |-
          TipoVoltaje indica si el voltaje ingresado es fase-neutro o fase-fase
          Valores: "FASE_NEUTRO" (Vfn), "FASE_FASE" (Vff), también acepta "FN" o "FF"
          Ejemplos: 127V es típicamente Vfn, 220V es típicamente Vff
        type: string
    required:
    - calibre
    - corriente_nominal
    - factor_potencia
    - hilos_por_fase
    - limite_caida
    - longitud_circuito
    - material
    - sistema_electrico
    - tension
    - tipo_canalizacion
    - tipo_voltaje
    type: object
  http.CaidaTensionResponse:
    properties:
      data:
        $ref: '#/definitions/dto.ResultadoCaidaTension'
      success:
        type: boolean
    type: object
  http.CaidaTensionResponseError:
    properties:
      code:
        type: string
      details:
        type: string
      error:
        type: string
      success:
        type: boolean
    type: object
  http.CalcularAmperajeRequest:
    properties:
      factor_potencia:
        description: FactorPotencia es el factor de potencia (requerido, > 0 y <=
          1)
        maximum: 1
        type: number
      potencia_watts:
        description: PotenciaWatts es la potencia activa en Watts (requerido, > 0)
        type: number
      sistema_electrico:
        description: |-
          SistemaElectrico indica el tipo de sistema eléctrico (requerido)
          Valores: "ESTRELLA" | "DELTA"
        type: string
      tension:
        description: Tension es la tensión del circuito en volts (requerido)
        type: integer
      tipo_carga:
        description: |-
          TipoCarga indica el tipo de carga eléctrica (requerido)
          Valores: "MONOFASICA" | "TRIFASICA"
        type: string
    required:
    - factor_potencia
    - potencia_watts
    - sistema_electrico
    - tension
    - tipo_carga
    type: object
  http.CalcularAmperajeResponse:
    properties:
      amperaje:
        type: number
      success:
        type: boolean
      unidad:
        type: string
    type: object
  http.CalcularAmperajeResponseError:
    properties:
      code:
        type: string
      details:
        type: string
      error:
        type: string
      success:
        type: boolean
    type: object
  http.CalcularMemoriaRequest:
    properties:
      amperaje_nominal:
        type: number
      diametro_control_mm:
        type: number
      equipo:
        allOf:
        - $ref: '#/definitions/dto.DatosEquipo'
        description: Equipo completo (modo LISTADO)
      estado:
        type: string
      factor_potencia:
        type: number
      hilos_por_fase:
        type: integer
      itm:
        description: Requerido en MANUAL_*, opcional en LISTADO (usa equipo.itm)
        type: integer
      longitud_circuito:
        type: number
      material:
        description: 'material: Cu (cobre), Al (aluminio)'
        type: string
      modo:
        allOf:
        - $ref: '#/definitions/dto.ModoCalculo'
        description: |-
          Modo de cálculo (required)
          Values: LISTADO, MANUAL_AMPERAJE, MANUAL_POTENCIA
      num_tuberias:
        type: integer
      porcentaje_caida_maximo:
        type: number
      potencia_nominal:
        type: number
      potencia_unidad:
        description: 'potencia_unidad: W, KW, KVA, KVAR'
        type: string
      sistema_electrico:
        allOf:
        - $ref: '#/definitions/dto.SistemaElectrico'
        description: |-
          Sistema eléctrico
          Values: DELTA, ESTRELLA, BIFASICO, MONOFASICO
      temperatura_override:
        type: integer
      tension:
        description: |-
          ═══════════════════════════════════════════════════════════════════════
          DATOS DE INSTALACIÓN (comunes a todos los modos)
          ═══════════════════════════════════════════════════════════════════════
        type: number
      tension_unidad:
        type: string
      tipo_canalizacion:
        description: 'tipo_canalizacion: TUBERIA_PVC, TUBERIA_ALUMINIO, TUBERIA_ACERO_PG,
          TUBERIA_ACERO_PD, CHAROLA_CABLE_ESPACIADO, CHAROLA_CABLE_TRIANGULAR'
        type: string
      tipo_equipo:
        description: |-
          Datos manuales (modo MANUAL_*)
          tipo_equipo: FILTRO_ACTIVO, TRANSFORMADOR, FILTRO_RECHAZO, CARGA
        type: string
      tipo_voltaje:
        description: 'tipo_voltaje: FASE_NEUTRO, FASE_FASE'
        type: string
    required:
    - estado
    - longitud_circuito
    - modo
    - sistema_electrico
    - tension
    - tipo_canalizacion
    - tipo_voltaje
    type: object
  http.CalcularMemoriaResponse:
    properties:
      data:
        $ref: '#/definitions/dto.MemoriaOutput'
