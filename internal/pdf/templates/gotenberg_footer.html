{{define "gotenberg_footer"}}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       Gotenberg Footer — Minimal Footer with Page Numbers
       Se renderiza en cada página del PDF con paginación
       ═══════════════════════════════════════════════════════════════════════════ */
    
    /* Dynamic color variables */
    :root {
      --primary: {{.Empresa.ColorPrimario}};
      --text-muted: #94a3b8;
      --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    .footer-container {
      width: 100%;
      display: table;
      table-layout: fixed;
      padding-top: 4px;
    }

    .footer-empresa-col {
      display: table-cell;
      vertical-align: bottom;
      text-align: left;
    }

    .footer-empresa-nombre {
      font-family: var(--font-sans);
      font-size: 7px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .footer-pagina-col {
      display: table-cell;
      vertical-align: bottom;
      text-align: right;
    }

    .footer-pagina {
      font-family: var(--font-sans);
      font-size: 7px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="footer-container">
    <div class="footer-empresa-col">
      <div class="footer-empresa-nombre">{{.Empresa.NombreCompleto}}</div>
    </div>
    <div class="footer-pagina-col">
      <!-- Paginación nativa de Chromium/Gotenberg -->
      <div class="footer-pagina">
        Página <span class="pageNumber"></span> de <span class="totalPages"></span>
      </div>
    </div>
  </div>
</body>
</html>
{{end}}
