{{define "gotenberg_header"}}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       Gotenberg Header — Premium Native Chromium Header
       Se renderiza en cada página del PDF
       ═══════════════════════════════════════════════════════════════════════════ */
    
    /* Dynamic color variables */
    :root {
      --primary: {{.Empresa.ColorPrimario}};
      --secondary: {{.Empresa.ColorSecundario}};
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border-light: #e2e8f0;
      --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    .header-container {
      width: 100%;
      display: table;
      table-layout: fixed;
      border-bottom: 1px solid var(--primary);
      padding-bottom: 6px;
    }

    .header-logo-col {
      display: table-cell;
      width: 60px;
      vertical-align: middle;
      text-align: left;
    }

    .logo-circle {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 800;
      color: white;
      overflow: hidden;
    }

    .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .header-info-col {
      display: table-cell;
      vertical-align: middle;
      text-align: left;
      padding-left: 15px;
    }

    .header-titulo {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .header-subtitulo {
      font-family: var(--font-sans);
      font-size: 8px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .header-empresa-col {
      display: table-cell;
      vertical-align: middle;
      text-align: right;
    }

    .header-empresa-nombre {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-proyecto {
      font-family: var(--font-sans);
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 2px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="header-container">
    <div class="header-logo-col">
      <div class="logo-circle" style="background: {{if eq .Empresa.ID "garfex"}}transparent{{else}}{{.Empresa.ColorPrimario}}{{end}};">
        {{if eq .Empresa.ID "garfex"}}
          <img src="data:image/png;base64,{{.LogoLetraBase64}}" alt="Garfex" />
        {{else}}
          {{capFirst .Empresa.ID}}
        {{end}}
      </div>
    </div>

    <div class="header-info-col">
      <div class="header-titulo">Memoria de Cálculo</div>
    </div>

    <div class="header-empresa-col">
      <div class="header-empresa-nombre">{{.Empresa.NombreCompleto}}</div>
      <div class="header-proyecto">
        {{.NombreProyecto}}
      </div>
    </div>
  </div>
</body>
</html>
{{end}}
