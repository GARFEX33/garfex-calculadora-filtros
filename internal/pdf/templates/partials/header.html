<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
{{define "header"}}
<style>
    /* Estilo Moderno para Header — Optimizado para wkhtmltopdf */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #1C1C1C;           /* neutroOscuroGarfex */
      background: #ffffff;
      /* Reducimos el padding y quitamos el borde grueso por una línea más fina */
      padding: 2mm 8mm;
      border-bottom: 0.5pt solid #EAEAEA;  /* bordesDivisores */
    }

    .header-contenido {
      display: table;
      width: 100%;
    }

    /* Columna del Logo */
    .header-logo-col {
      display: table-cell;
      width: 55pt;
      vertical-align: middle;
    }

    .logo-circle {
      width: 25pt;
      height: 25pt;
      border-radius: 6px;
      text-align: center;
      line-height: 45pt;
      font-weight: bold;
      font-size: 24pt;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      background: {{if eq .Empresa.ID "garfex"}}#ffffff{{else}}{{.Empresa.ColorPrimario}}{{end}};
    }

    .logo-circle img {
      max-width: 90%;
      max-height: 90%;
      width: auto;
      height: auto;
      border-radius: 4px;
    }

    /* Columna de Títulos */
    .header-info-col {
      display: table-cell;
      vertical-align: middle;
      padding-left: 10pt;
    }

    .header-titulo {
      font-size: 10pt;
      font-weight: 700;
      color: {{.Empresa.ColorPrimario}};  /* color primario dinámico */
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .header-subtitulo {
      font-size: 7pt;
      color: #6E6E6E;               /* textoSecundario */
      font-weight: 400;
      margin-top: 1pt;
    }

    /* Columna Derecha (Datos de Empresa / Proyecto) */
    .header-empresa-col {
      display: table-cell;
      vertical-align: middle;
      text-align: right;
    }

    .header-empresa-nombre {
      font-size: 8pt;
      font-weight: 700;
      color: {{.Empresa.ColorPrimario}};  /* color primario dinámico */
    }

    .header-proyecto {
      font-size: 7pt;
      color: #6E6E6E;            /* textoSecundario */
      margin-top: 1pt;
      max-width: 200pt;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>

<body>
  <div class="header-contenido">
    <div class="header-logo-col">
      <div class="logo-circle">
        {{if eq .Empresa.ID "garfex"}}
          <img src="data:image/png;base64,{{.LogoLetraBase64}}" alt="Garfex" />
        {{else}}
          {{capFirst .Empresa.ID}}
        {{end}}
      </div>
    </div>

    <div class="header-info-col">
      <div class="header-titulo">Memoria de Cálculo</div>
      <div class="header-subtitulo">NOM-001-SEDE-2012 • Ingeniería Eléctrica</div>
    </div>

    <div class="header-empresa-col">
      <div class="header-empresa-nombre">{{.Empresa.NombreCompleto}}</div>
      <div class="header-proyecto">
        {{.NombreProyecto}}
      </div>
    </div>
  </div>
{{end}}
</body>

</html>
