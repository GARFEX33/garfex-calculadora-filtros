<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
{{define "footer"}}
</head>
<body>
  <!-- Footer con paginación automática usando variables JavaScript de wkhtmltopdf -->
  <div class="footer-contenido">
    <div class="footer-empresa-col">
      <div class="footer-empresa-nombre">Garfex Ingeniería Eléctrica</div>
      <div class="footer-empresa-contacto">NOM-001-SEDE-2012 — Documento técnico generado por Garfex Calculadora</div>
    </div>
    <div class="footer-pagina-col">
      <!-- wkhtmltopdf reemplaza <span class="page"> y <span class="topage"> automáticamente -->
      <div class="footer-pagina">
        Página <span class="page"></span> de <span class="topage"></span>
      </div>
      <div class="footer-normativa">Cálculo Eléctrico — Uso interno</div>
    </div>
  </div>

  <!-- Script de paginación requerido por wkhtmltopdf -->
  <script>
    var vars = {};
    var x = document.location.search.substring(1).split('&');
    for (var i in x) {
      var z = x[i].split('=', 2);
      vars[z[0]] = unescape(z[1]);
    }
    var x = ['frompage','topage','page','webpage','section','subsection','subsubsection'];
    for (var i in x) {
      var y = document.getElementsByClassName(x[i]);
      for (var j = 0; j < y.length; ++j) {
        y[j].textContent = vars[x[i]];
      }
    }
  </script>
{{end}}
</body>
</html>
