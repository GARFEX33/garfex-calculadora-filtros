<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<style>
/* Footer base styles - Pagination handled by Gotenberg native classes */
.footer-pagina {
  text-align: right;
  font-size: 8pt;
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  color: #3d3d3d;
}
</style>
{{define "footer"}}
</head>
<body>
  <!-- Footer con información de empresa y paginación Gotenberg -->
  <div class="footer-contenido" style="display: flex; justify-content: space-between; align-items: flex-end;">
    <div class="footer-empresa-col">
      <div class="footer-empresa-nombre">{{.Empresa.NombreCompleto}}</div>
      <div class="footer-empresa-contacto">NOM-001-SEDE-2012 — Documento técnico generado por {{.Empresa.NombreCompleto}} Calculadora</div>
    </div>
    <div class="footer-pagina-col">
      <!-- Paginación nativa de Chromium/Gotenberg -->
      <div class="footer-pagina">
        Página <span class="pageNumber"></span> de <span class="totalPages"></span>
      </div>
      <div class="footer-normativa">Cálculo Eléctrico — Uso interno</div>
    </div>
  </div>
{{end}}
</body>
</html>
