version: "3.8"

# Servicios de garfex-calculadora-filtros
# Requiere que el stack GARFEXIA esté corriendo (Postgres en :5434, Gotenberg en :3015)
# Configurar variables en .env (ver .env.example)

services:
  calculadora-filtros-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped

  calculadora-filtros-web:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
      args:
        # Se bake en el bundle en build time — debe ser la IP real del servidor
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "5173:3000"
    depends_on:
      - calculadora-filtros-api
    restart: unless-stopped
