version: "3.8"

# Servicios de garfex-calculadora-filtros
# Requiere que el stack GARFEXIA esté corriendo (Postgres en :5434, Gotenberg en :3015)

services:
  calculadora-filtros-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: "5434"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-postgres}
      GOTENBERG_URL: http://host.docker.internal:3015/forms/chromium/convert/html
    env_file:
      - .env
    restart: unless-stopped

  calculadora-filtros-web:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    ports:
      - "5173:3000"
    environment:
      # URL pública del API — debe ser la IP o dominio del servidor, visible desde el navegador
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - calculadora-filtros-api
    restart: unless-stopped
